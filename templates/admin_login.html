<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Book Login Form</title>
    <style>
        body{
            display: flex;
            justify-content: center;
            color:black;
            background-image:url("./library.jpg");
            background-size: cover;
            background-repeat: no-repeat;
        
        }
        input{
            padding: 10px;
            width: 300px;
            border-radius: 5px;

        }
        button{
            width:80px;
            height: 40px;
            position: relative;
            left: 50px;
            border-radius: 5px;
            margin-left: 70px;
        }
        h2{
            margin-left: 90px;
        }
        label{
            font-size: 25px;
            font-weight: bold;
        }

    </style>
</head>
<body>

    <form method="POST" action="{% url 'adminlogin' %}">
        {% csrf_token %}
        <h1> Admin Login Form</h1>
        <label for="Name">User Name</label><br>
        <input type="text" placeholder="User Name" required name="Name"> <br><br>
        <label for="Password">Password</label><br>
        <input type="password" placeholder="Enter Password" required name="Password"><br><br>
        <button type="submit">Login</button><br><br>
       

    </form>
</body>
</html>
